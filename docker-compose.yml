version: '3.8'

services:
  enthalpy-calculator:
    build: .
    ports:
      - "5010:5010"
    volumes:
      - ./uploads:/app/uploads
      - ./:/app
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
